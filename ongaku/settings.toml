# Interface language. Options: "en" (English), "zh" (Chinese), "ja" (Japanese)
log_level = "en"

# Interface language. Options: "en" (English), "zh" (Chinese), "ja" (Japanese)
language = "zh"

# Directory for storing temporary files (logs, cache, etc.)
temp_directory = "D:\\ongaku-tmp"

# Directory for storing album metadata files
metadata_directory = "D:\\ongaku-metadata"

# Directory for storing album audio files
resource_directory = "D:\\移动云盘同步盘\\ongaku-resource"

# Visual theme for the interface. Options: "dark" or "light"
ui_color_theme = "light"

# Base font size for the user interface (in points)
ui_font_size = 9

# Font family used throughout the interface. Recommended: "JetBrains Mono"
ui_font_family = "JetBrains Mono"
